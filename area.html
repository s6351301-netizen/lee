<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <title>篩選資料表</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    input,
    select {
      margin: 10px;
      padding: 5px;
    }

    table {
      border-collapse: collapse;
      width: 95%;
      margin: 20px auto;
    }

    th,
    td {
      border: 1px solid #666;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #eee;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:nth-child(odd) {
      background-color: #e6f2ff;
    }

    tr:hover {
      background-color: #87cefa;
      /*文字顏色#7fffd4*/
    }

    /* 統計列樣式 */
    .stats-row th {
      text-align: center;
      font-weight: bold;
      background-color: #f0f0f0;
    }

    .male-stats {
      color: darkblue;
      font-weight: bold;
      font-size: 20px;
    }

    .female-stats {
      color: darkred;
      font-weight: bold;
      font-size: 20px;
    }

    .total-stats {
      color: darkgreen;
      font-weight: bold;
      font-size: 20px;
    }

    .all-stats {
      color: purple;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <div>
    <label>文字篩選1：</label>
    <input type="text" id="textFilter1" placeholder="輸入文字...">
    <label>文字篩選2：</label>
    <input type="text" id="textFilter2" placeholder="輸入文字...">
    <label>地區選單：</label>
    <select id="regionFilter">
      <option value="">--全部--</option>
    </select>
    <button onclick="applyFilter()">篩選</button>
  </div>

    <h2 id="filter-title">全部資料表</h2>

  <div id="result-table">載入中...</div>

  <script>
    let allData = [];

    function getTodayROC() {
      const today = new Date();
      const rocYear = today.getFullYear() - 1911;
      const rocMonth = today.getMonth() + 1;
      return { rocYear, rocMonth };
    }

    function parseBirthROC(birth) {
      if (!birth) return null;
      const match = birth.match(/民國\s*(\d+)\.(\d+)\./);
      if (!match) return null;
      const year = parseInt(match[1], 10);
      const month = parseInt(match[2], 10);
      return { year, month };
    }

    function calculateAge(birth) {
      const birthROC = parseBirthROC(birth);
      if (!birthROC) return "";
      const { rocYear, rocMonth } = getTodayROC();
      const diffYear = rocYear - birthROC.year;
      const diffMonth = rocMonth - birthROC.month;
      const age = diffYear + diffMonth / 12;
      return age.toFixed(1);
    }

    function extractRegion(address) {
      if (!address) return "";
      const match = address.match(/(.+?)(國|縣|鎮|區)/);
      return match ? match[0] : "";
    }

    function buildTable(data, filterText1, filterText2, filterRegion) {
      let maleCount = data.filter(i => i.gender === "男").length;
      let femaleCount = data.filter(i => i.gender === "女").length;
      const total = data.length;
      const allCount = allData.length;

      // 更新標題
      let title = "全部資料表";
      let conditions = [];
      if (filterText1) conditions.push(`"${filterText1}"`);
      if (filterText2) conditions.push(`"${filterText2}"`);
      if (filterRegion) conditions.push(`"${filterRegion}"`);
      if (conditions.length > 0) {
        title = conditions.join(" 或 ") + " 資料篩選結果";
      }
      document.getElementById("filter-title").innerText = title;

      let html = "<table>";
      html += `<tr class="stats-row"><th colspan="10">
        <span class="male-stats">男性：${maleCount} 人</span>　
        <span class="female-stats">女性：${femaleCount} 人</span>　
        <span class="total-stats">符合條件：${total} 筆</span>　
        <span class="all-stats">總共有：${allCount} 筆</span>
      </th></tr>`;
      html += "<tr><th>編號</th><th>姓名</th><th>性別</th><th>出生年月日</th><th>年紀 / 歲</th><th>出生地</th><th>住址</th><th>備註</th><th>變動前編號</th></tr>";
      data.forEach(item => {
        const age = calculateAge(item.birth);
        html += `<tr>
          <td>${item.id || ""}</td>
          <td>${item.name || ""}</td>
          <td>${item.gender || ""}</td>
          <td>${item.birth || ""}</td>
          <td>${age}</td>
          <td>${item.birthplace || ""}</td>
          <td>${item.address || ""}</td>
          <td>${item.note || ""}</td>
          <td>${item.prev_id || ""}</td>
        </tr>`;
      });
      html += "</table>";
      document.getElementById("result-table").innerHTML = html;
    }

    function applyFilter() {
      const textValue1 = document.getElementById("textFilter1").value.trim();
      const textValue2 = document.getElementById("textFilter2").value.trim();
      const regionValue = document.getElementById("regionFilter").value;
      const filtered = allData.filter(item => {
        const matchText1 = textValue1 ? (
          (item.name && item.name.includes(textValue1)) ||
          (item.address && item.address.includes(textValue1)) ||
          (item.birthplace && item.birthplace.includes(textValue1))
        ) : false;
        const matchText2 = textValue2 ? (
          (item.name && item.name.includes(textValue2)) ||
          (item.address && item.address.includes(textValue2)) ||
          (item.birthplace && item.birthplace.includes(textValue2))
        ) : false;
        const matchRegion = regionValue ? (item.address && item.address.includes(regionValue)) : false;
        return matchText1 || matchText2 || matchRegion;
      });
      buildTable(filtered, textValue1, textValue2, regionValue);
    }

    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        allData = data;
        buildTable(allData, "", "", "");

        // 建立下拉選單
        const regions = new Set();
        data.forEach(item => {
          const region = extractRegion(item.address);
          if (region) regions.add(region);
        });
        const select = document.getElementById("regionFilter");
        regions.forEach(r => {
          const opt = document.createElement("option");
          opt.value = r;
          opt.textContent = r;
          select.appendChild(opt);
        });
      })
      .catch(err => {
        document.getElementById("result-table").innerHTML = "載入失敗：" + err.message;
      });
  </script>
</body>

</html>
