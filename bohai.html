    <h2>5. 堂號由來網頁：bohai.html  02.01 渤海堂號由來</h2>
    <p>高氏源流源遠流長，天下高姓，多奉「渤海」為堂號。</p>
    <p>齊太公呂尚（姜太公）之六世孫文公，其子公子高之孫傒，以祖父名為氏，遂為高氏。後世子孫於漢代在渤海郡（今河北、遼寧一帶）發展成為望族，故以「渤海堂」傳家。</p>
