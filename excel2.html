<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>篩選資料表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        input,
        select {
            margin: 10px;
            padding: 5px;
        }

        table {
            border-collapse: collapse;
            width: 95%;
            margin: 20px auto;
        }

        th,
        td {
            border: 1px solid #666;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #eee;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:nth-child(odd) {
            background-color: #e6f2ff;
        }

        tr:hover {
            background-color: #87cefa;
            /*文字顏色#7fffd4*/
        }

        /* 統計列樣式 */
        .stats-row th {
            text-align: center;
            font-weight: bold;
            background-color: #f0f0f0;
        }

        .male-stats {
            color: darkblue;
            font-weight: bold;
            font-size: 20px;
        }

        .female-stats {
            color: darkred;
            font-weight: bold;
            font-size: 20px;
        }

        .total-stats {
            color: darkgreen;
            font-weight: bold;
            font-size: 20px;
        }

        .all-stats {
            color: purple;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div>
        <label>文字篩選1：</label>
        <input type="text" id="textFilter1" placeholder="輸入文字...">
        <label>文字篩選2：</label>
        <input type="text" id="textFilter2" placeholder="輸入文字...">
        <label>地區選單：</label>
        <select id="regionFilter">
            <option value="">--全部--</option>
        </select>
        <button onclick="applyFilter()">篩選</button>
    </div>

    <h2 id="filter-title">全部資料表</h2>

    <div id="result-table">載入中...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        let allData = [];
        /*
                // 🌟 新增：萬用去 HTML 標籤輔助函式
                function stripHtml(str) {
                    if (typeof str !== 'string') return str || "";
                    return str.replace(/<[^>]*>/g, '');
                }
        */

        function stripHtml(str) {
            // 異動點：新增型態判斷。如果不是字串（例如純數字的 ID），就強制轉成字串，避免 .replace() 噴錯
            if (typeof str !== 'string') return str !== undefined && str !== null ? String(str) : "";
            return str.replace(/<[^>]*>/g, '');
        }

        function getTodayROC() {
            const today = new Date();
            const rocYear = today.getFullYear() - 1911;
            const rocMonth = today.getMonth() + 1;
            return { rocYear, rocMonth };
        }

        function parseBirthROC(birth) {
            if (!birth) return null;
            // 🌟 修改：先將生日可能含有的 HTML 標籤去掉，以符合正規表示式
            const cleanBirth = stripHtml(birth);
            const match = cleanBirth.match(/民國\s*(\d+)\.(\d+)\./);
            if (!match) return null;
            const year = parseInt(match[1], 10);
            const month = parseInt(match[2], 10);
            return { year, month };
        }

        function calculateAge(birth) {
            const birthROC = parseBirthROC(birth);
            if (!birthROC) return "";
            const { rocYear, rocMonth } = getTodayROC();
            const diffYear = rocYear - birthROC.year;
            const diffMonth = rocMonth - birthROC.month;
            const age = diffYear + diffMonth / 12;
            return age.toFixed(1);
        }

        function extractRegion(address) {
            if (!address) return "";
            const match = address.match(/(.+?)(國|縣|鎮|區)/);
            return match ? match[0] : "";
        }

        function buildTable(data, filterText1, filterText2, filterRegion) {
            // 🌟 修改：統計男女人數時先去標籤，避免 gender 欄位內的 HTML 語法干擾
            let maleCount = data.filter(i => stripHtml(i.gender) === "男").length;
            let femaleCount = data.filter(i => stripHtml(i.gender) === "女").length;
            const total = data.length;
            const allCount = allData.length;

            // 更新標題
            let title = "全部資料表";
            let conditions = [];
            if (filterText1) conditions.push(`"${filterText1}"`);
            if (filterText2) conditions.push(`"${filterText2}"`);
            if (filterRegion) conditions.push(`"${filterRegion}"`);
            if (conditions.length > 0) {
                title = conditions.join(" 或 ") + " 資料篩選結果";
            }
            document.getElementById("filter-title").innerText = title;

            let html = "<table>";
            html += `<tr class="stats-row"><th colspan="10">
        <span class="male-stats">男性：${maleCount} 人</span>　
        <span class="female-stats">女性：${femaleCount} 人</span>　
        <span class="total-stats">符合條件：${total} 筆</span>　
        <span class="all-stats">總共有：${allCount} 筆</span>&emsp;&emsp;
        <button id="downloadExcel" onclick="exportExcel()">下載 Excel</button>
      </th></tr>`;
            html += "<tr><th>編號</th><th>姓名</th><th>性別</th><th>出生年月日</th><th>年紀 / 歲</th><th>出生地</th><th>住址</th><th>備註</th><th>變動前編號</th></tr>";

            // 畫面渲染依然輸出含原汁原味 HTML 語法的 JSON 值
            data.forEach(item => {
                const age = calculateAge(item.birth);
                html += `<tr>
          <td>${item.id || ""}</td>
          <td>${item.name || ""}</td>
          <td>${item.gender || ""}</td>
          <td>${item.birth || ""}</td>
          <td>${age}</td>
          <td>${item.birthplace || ""}</td>
          <td>${item.address || ""}</td>
          <td>${item.note || ""}</td>
          <td>${item.prev_id || ""}</td>
        </tr>`;
            });
            html += "</table>";
            document.getElementById("result-table").innerHTML = html;
        }

        // 匯出 EXCEL 檔案
        function exportExcel() {
            // 取得當前畫面上的表格
            var originalTable = document.querySelector("table");
            if (!originalTable) return alert("找不到表格資料");

            // 🌟 修改：複製一份表格節點，動態將裡面所有的 <td> 標籤內容去除 HTML 碼，確保匯出的 Excel 是乾淨純文字
            var clonedTable = originalTable.cloneNode(true);
            var cells = clonedTable.getElementsByTagName("td");
            for (var i = 0; i < cells.length; i++) {
                cells[i].textContent = stripHtml(cells[i].innerHTML);
            }

            // 將處理過（沒有網頁標籤）的 HTML Table 轉成 SheetJS 的工作表
            var wb = XLSX.utils.table_to_book(clonedTable, { sheet: "篩選結果" });

            // 下載 Excel 檔案
            XLSX.writeFile(wb, "篩選結果.xlsx");
        }

        function applyFilter() {
            const textValue1 = document.getElementById("textFilter1").value.trim();
            const textValue2 = document.getElementById("textFilter2").value.trim();
            const regionValue = document.getElementById("regionFilter").value;

            //修改：比對前先把欄位值用 stripHtml 轉回乾淨的純文字 
            //異動點：獨立出一個萬用檢查函式，打包所有欄位
            const checkMatch = (item, searchValue) => {
                if (!searchValue) return false;

                // 將所有原始 JSON 欄位都轉換並去除 HTML 標籤
                const cleanId = stripHtml(item.id);
                const cleanName = stripHtml(item.name);
                const cleanGender = stripHtml(item.gender);
                const cleanBirth = stripHtml(item.birth);
                const cleanBirthplace = stripHtml(item.birthplace);
                const cleanAddress = stripHtml(item.address);
                const cleanNote = stripHtml(item.note);
                const cleanPrevId = stripHtml(item.prev_id);

                // 核心異動：因為原始資料沒年齡欄位，在此即時計算出「年紀」純文字以供搜尋
                const cleanAge = calculateAge(item.birth);

                // 檢查輸入的關鍵字是否包含在任一欄位中
                return (
                    cleanId.includes(searchValue) ||
                    cleanName.includes(searchValue) ||
                    cleanGender.includes(searchValue) ||
                    cleanBirth.includes(searchValue) ||
                    cleanAge.includes(searchValue) || // 年紀比對
                    cleanBirthplace.includes(searchValue) ||
                    cleanAddress.includes(searchValue) ||
                    cleanNote.includes(searchValue) ||
                    cleanPrevId.includes(searchValue)
                );
            };

            const filtered = allData.filter(item => {
                // 如果完全沒輸入任何條件，直接回傳 true 顯示全部
                if (!textValue1 && !textValue2 && !regionValue) return true;

                const matchText1 = textValue1 ? checkMatch(item, textValue1) : false;
                const matchText2 = textValue2 ? checkMatch(item, textValue2) : false;

                const cleanAddress = stripHtml(item.address);
                const matchRegion = regionValue ? cleanAddress.includes(regionValue) : false;

                return matchText1 || matchText2 || matchRegion;
            });

            buildTable(filtered, textValue1, textValue2, regionValue);
        }

        fetch('data2.json')
            .then(res => res.json())
            .then(data => {
                allData = data; // 🌟 核心：全域變數依然維持原始含有 HTML 標籤的 JSON 資料
                buildTable(allData, "", "", "");

                // 建立下拉選單
                const regions = new Set();
                data.forEach(item => {
                    // 🌟 修改：地址先動態去除 HTML 標籤後，再擷取地區字串，避免選單破版
                    const cleanAddress = stripHtml(item.address);
                    const region = extractRegion(cleanAddress);
                    if (region) regions.add(region);
                });
                const select = document.getElementById("regionFilter");
                regions.forEach(r => {
                    const opt = document.createElement("option");
                    opt.value = r;
                    opt.textContent = r; // 選單文字呈現乾淨純文字
                    select.appendChild(opt);
                });
            })
            .catch(err => {
                document.getElementById("result-table").innerHTML = "載入失敗：" + err.message;
            });
    </script>
</body>

</html>
